<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- ── THEME TOGGLE ─────────────────────────────────────── -->
    <div id="theme-toggle-wrap">
      <button id="theme-toggle" class="btn btn-ghost" aria-label="Toggle theme">
        🌙 Dark
      </button>
    </div>

    <!-- ── GREETING ─────────────────────────────────────────── -->
    <section class="card" id="greeting-section">
      <h1 id="greeting-text">Good Morning!</h1>
      <p id="current-time" class="time-display">00:00:00</p>
      <p id="current-date" class="date-display">Monday, January 1, 2025</p>
      <div id="name-row" class="name-row">
        <input
          type="text"
          id="name-input"
          placeholder="Enter your name…"
          maxlength="40"
          aria-label="Your name"
        />
        <button id="name-save" class="btn btn-primary">Save</button>
        <button id="name-edit" class="btn btn-ghost" style="display:none">✏️ Edit</button>
      </div>
    </section>

    <!-- ── FOCUS TIMER ───────────────────────────────────────── -->
    <section class="card" id="timer-section">
      <h2>Focus Timer</h2>
      <p id="timer-display" class="timer-display">25:00</p>
      <div class="btn-group">
        <button id="timer-start" class="btn btn-primary">Start</button>
        <button id="timer-stop" class="btn btn-secondary">Stop</button>
        <button id="timer-reset" class="btn btn-ghost">Reset</button>
      </div>
    </section>

    <!-- ── TO-DO LIST ────────────────────────────────────────── -->
    <section class="card" id="todo-section">
      <h2>To-Do List</h2>
      <div class="input-row">
        <input
          type="text"
          id="todo-input"
          placeholder="Add a new task…"
          maxlength="120"
        />
        <button id="todo-add" class="btn btn-primary">Add</button>
      </div>
      <p id="todo-warning" class="todo-warning" aria-live="polite"></p>
      <ul id="todo-list"></ul>
    </section>

    <!-- ── QUICK LINKS ───────────────────────────────────────── -->
    <section class="card" id="links-section">
      <h2>Quick Links</h2>
      <div class="input-row">
        <input
          type="text"
          id="link-name-input"
          placeholder="Link name…"
          maxlength="40"
        />
        <input
          type="url"
          id="link-url-input"
          placeholder="https://…"
          maxlength="300"
        />
        <button id="link-add" class="btn btn-primary">Add</button>
      </div>
      <div id="links-container"></div>
    </section>

    <script src="js/script.js"></script>
  </body>
</html>
